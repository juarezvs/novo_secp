services:
  secp-postgres:
    image: pgvector/pgvector:0.8.2-pg17
    container_name: secp-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: secp_user
      POSTGRES_PASSWORD: secp_password
      POSTGRES_DB: secp_db
      TZ: America/Manaus

    ports:
      - "5432:5432"

    volumes:
      - secp_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    networks:
      - secp_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secp_user -d secp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  secp_postgres_data:

networks:
  secp_network:
    driver: bridge